<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <!-- Definition for modern gradients and glowing effects -->
  <defs>
    <!-- Background Gradient - Deep space/indigo aesthetic -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- LV Monogram Gradient - Neon Blue to Purple -->
    <linearGradient id="lv-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <!-- Outer Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Rounded Squircle Background -->
  <rect width="120" height="120" rx="32" ry="32" fill="url(#bg-grad)" />

  <!-- L Character - Sleek geometry -->
  <!-- Starts thick on top left, angles down, cuts right -->
  <path d="M 32 30 
           L 46 30 
           L 46 76 
           L 70 76 
           L 68 88 
           L 32 88 Z" 
        fill="url(#lv-grad)" 
        filter="url(#glow)" />

  <!-- V Character - overlapping right -->
  <!-- Sharp dynamic angles -->
  <path d="M 54 30 
           L 68 30 
           L 80 66 
           L 92 30 
           L 106 30 
           L 88 88 
           L 72 88 Z" 
        fill="url(#lv-grad)" 
        opacity="0.95" 
        filter="url(#glow)" />
        
  <!-- Sparkle Accent (optional corporate touch) -->
  <circle cx="86" cy="30" r="4" fill="#67e8f9" filter="url(#glow)"/>
</svg>
